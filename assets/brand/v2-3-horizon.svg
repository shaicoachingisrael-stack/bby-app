<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#FAFAF8"/>

  <!-- Terracotta half-circle (rising sun) sitting on a horizon line -->
  <g>
    <path d="M 232,440 A 280,280 0 0 1 792,440 Z" fill="#C97D60"/>
    <line x1="180" y1="440" x2="844" y2="440" stroke="#0A0A0A" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Letters under the horizon, perfectly aligned -->
  <text x="512" y="700"
        font-family="Montserrat, 'Helvetica Neue', sans-serif"
        font-weight="800"
        font-size="280"
        fill="#0A0A0A"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-18">bby</text>

  <!-- Wordmark -->
  <text x="512" y="900"
        font-family="Montserrat, 'Helvetica Neue', sans-serif"
        font-weight="500"
        font-size="40"
        fill="#0A0A0A"
        text-anchor="middle"
        letter-spacing="18">BODY BY YOU</text>
</svg>
